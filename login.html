<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - Al-Falah</title>
    <style>
        /* styling seadanya aja, yang penting fungsional */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 360px;
            backdrop-filter: blur(5px);
        }
        h2 {
            text-align: center;
            color: #2d3436;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #636e72;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2d3436;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 12px;
            border: 1.5px solid #dfe6e9;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.2s;
            background: #f8f9fa;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
        }
        button {
            width: 100%;
            padding: 13px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a4bd1;
        }
        .masuk-text {
            text-align: center;
            font-size: 13px;
            color: #636e72;
            margin-top: 8px;
        }
        .error-msg {
            color: #d63031;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Selamat Datang</h2>
        <p class="subtitle">Silakan isi data kamu dulu ya</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" id="namaLengkap" placeholder="cth. Ahmad Fauzi" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>

            <div class="input-group">
                <label>Jenis Kelamin</label>
                <select id="jenisKelamin" required>
                    <option value="" disabled selected>-- Pilih --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="input-group">
                <label>Umur</label>
                <input type="number" id="umur" placeholder="cth. 16" min="10" max="20" required>
            </div>

            <div class="input-group">
                <label>Kelas</label>
                <select id="kelas" required>
                    <option value="" disabled selected>-- Pilih Kelas --</option>
                    <option value="X RPL">X RPL</option>
                    <option value="X TKJ">X TKJ</option>
                    <option value="XI RPL">XI RPL</option>
                    <option value="XI TKJ">XI TKJ</option>
                    <option value="XII RPL">XII RPL</option>
                    <option value="XII TKJ">XII TKJ</option>
                </select>
            </div>

            <button type="submit">Login</button>
            <div class="masuk-text">masuk</div>
            <div id="errorMessage" class="error-msg"></div>
        </form>
    </div>

    <script>
        // logic simple aja, ga pake ribet" validasi realtime
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // biar ga reload
            
            // ambil value dari form
            const nama = document.getElementById('namaLengkap').value.trim();
            const password = document.getElementById('password').value.trim();
            const jk = document.getElementById('jenisKelamin').value;
            const umur = document.getElementById('umur').value;
            const kelas = document.getElementById('kelas').value;
            const errorBox = document.getElementById('errorMessage');
            
            // reset error dulu
            errorBox.style.display = 'none';
            
            // pengecekan admin
            if (nama.toLowerCase() === 'admin' && password === 'admin123') {
                // ini admin, arahin ke dashboard
                // simpan data admin ke sessionStorage biar dashboard tau
                sessionStorage.setItem('userRole', 'admin');
                sessionStorage.setItem('currentUser', JSON.stringify({
                    nama: 'Administrator',
                    password: 'admin123',
                    jk: 'Laki-laki',
                    umur: '-',
                    kelas: 'Admin'
                }));
                window.location.href = 'dashboard.html';
                return;
            }
            
            // kalo bukan admin, berarti murid biasa
            // cek dulu semua field keisi
            if (!nama || !password || !jk || !umur || !kelas) {
                errorBox.textContent = 'Harap isi semua data dengan lengkap, ya!';
                errorBox.style.display = 'block';
                return;
            }
            
            // simpan data murid ke sessionStorage (buat jaga" kalo nanti diperlukan)
            const userData = {
                nama: nama,
                password: password,
                jk: jk,
                umur: umur,
                kelas: kelas
            };
            sessionStorage.setItem('userRole', 'siswa');
            sessionStorage.setItem('currentUser', JSON.stringify(userData));
            
            // arahkan murid ke website al-falahcom
            window.location.href = 'https://al-falahcom.vercel.app';
        });
    </script>

</body>
</html>
